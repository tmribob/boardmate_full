name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boardmate_back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8 pytest 

      - name: Run Linter (flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run pytest
        run: python -m pytest

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: boardmate_front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: boardmate_front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint || echo "No lint script found"

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

  docker-build-and-test:
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: |
          echo "DATABASE_URL=${{ secrets.DB_URL }}" >> .env
          cp .env.example .env # Или используй секреты GitHub (Пункт 4.2)

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in {1..10}; do
            if curl -fsS http://localhost/health; then
              echo "Backend is up!"
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Deploy status
        run: echo "Приложение успешно прошло проверки и готово к деплою!"

      - name: Stop stack
        if: always()
        run: docker compose down -v